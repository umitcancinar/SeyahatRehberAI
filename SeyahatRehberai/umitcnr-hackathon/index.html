<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeyahatRehberAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="sidebar" class="sidebar collapsed">
        <div class="sidebar-header">
            <h3>Geçmiş Aramalar</h3>
        </div>
        <ul id="history-list">
        </ul>
    </aside>

    <main class="main-content">
        <header>
            <div class="header-left">
                <button id="menu-toggle" class="icon-btn">☰</button>
                <span class="logo">SeyahatRehberAI</span>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn">🌙</button>
            </div>
        </header>

        <section id="chat-container" class="chat-container">
            <div id="welcome-screen" class="welcome-screen">
                <h2>Nereyi keşfetmek istersin?</h2>
            </div>
            <div id="result-content" class="result-content hidden"></div>
        </section>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="city-input" placeholder="Bir şehir girin (Örn: Paris, Tokyo)..." autocomplete="off">
                <button id="send-btn" class="icon-btn send-btn">➤</button>
            </div>
            <p class="signature">CREATED, DESIGNED AND DEVELOPED BY UMITCANCINAR</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
